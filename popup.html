<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APISlurp</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header id="toolbar">
    <div class="brand">
      <span class="icon">⚡</span>
      <span>APISlurp</span>
    </div>
    <div class="actions">
      <button id="attach" class="btn primary">Attach</button>
      <button id="clear" class="btn secondary">Clear</button>
    </div>
  </header>

  <div id="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Filter by URL…" spellcheck="false" />
    <span id="count-badge">0</span>
  </div>

  <div id="logs"></div>

  <footer id="status-bar">
    <span id="status-text">Ready</span>
    <span id="status-count">0 requests</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
