<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brutu Suite</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header id="toolbar">
    <div class="brand">
      <a id="status-link" href="https://hangga.web.id/BrutuSuite" target="_blank">
      <img width="150px" class="icon" src="icons/logo-light-prop-small.png"/>
      </a>
      <!-- <span>Brutu Suite</span> -->
    </div>
    <div class="actions">
      <button id="attach" class="btn primary">Intercept</button>
      <button id="clear" class="btn secondary">Clear</button>
    </div>
  </header>

  <div id="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Filter by URL…" spellcheck="false" />
    <span id="count-badge">0</span>
  </div>

  <div id="split-view">
    <div id="log-list"></div>
    <div id="divider"></div>
    <div id="detail-panel">
      <div id="detail-empty">Select a request to view details</div>
      <div id="detail-content"></div>
    </div>
  </div>

  <footer id="status-bar">
    <span id="status-text">Ready</span>
    <span id="status-count">0 requests</span>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
