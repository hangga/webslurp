<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brutu Suite</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div id="search-bar">

    <!-- Traffic -->
    <button id="reload-btn" class="toolbtn" title="Reload" style="padding:4px;">
      <img src="icons/reload.png" class="btn-icon" id="btn-icon" title="Reload"/>
      <span id="btn-spinner" class="spinner" hidden></span>
    </button>
    
    <div class="theme-picker">
      <img id="img-api" hidden src="icons/api.png" class="filter-icon" title="Filter" />
      <img id="img-all" hidden src="icons/all.png" class="filter-icon" title="Filter" />
      <img id="img-custom" hidden src="icons/filter.png" class="filter-icon" title="Filter" />
      <select id="capture-mode">
        <option value="api">API Only</option>
        <option value="all">All Traffic</option>
        <option value="custom">Custom</option>
      </select>
    </div>

    <!-- Request Filter -->
    <input
        id="search"
        type="text"
        placeholder="Search/ filter requests..."
        spellcheck="false"/>

    

    
    <!-- Status -->
    <span id="count-badge">0</span>

    <!-- Theme -->
    <div class="actions">
      <div class="theme-picker">
        <img src="icons/theme.png" class="theme-icon"/>
        <select id="theme-select">
          <option value="vscode-dark">VS Code Dark</option>
          <option value="jetbrains-dark">JetBrains Dark</option>
          <option value="one-dark">One Dark</option>
          <option value="solarized-dark">Solarized Dark</option>
          <option value="vscode-light">VS Code Light</option>
          <option value="github-light">GitHub Light</option>
          <option value="dracula">Dracula</option>
          <option value="monokai">Monokai</option>
          <option value="nord">Nord</option>
          <option value="catppuccin">Catppuccin</option>
          <option value="tokyo-night">Tokyo Night</option>
          <option value="gruvbox">Gruvbox</option>
          <option value="ayu-dark">Ayu Dark</option>
          <option value="ayu-light">Ayu Light</option>
          <option value="material-dark">Material Dark</option>
          <option value="material-light">Material Light</option>
          <option value="palenight">Palenight</option>
          <option value="solarized-light">Solarized Light</option>
        </select>
      </div>
    </div>

  </div>

  <div id="split-view">
    <div id="log-list">
      <div id="custom-filters">
          <label><input type="checkbox" id="filter-http-only" checked> HTTP/HTTPS only</label>
          <label><input type="checkbox" id="filter-skip-options" checked> Skip OPTIONS</label>
          <label><input type="checkbox" id="filter-skip-images" checked> Skip Images</label>
          <label><input type="checkbox" id="filter-skip-css" checked> Skip CSS</label>
          <label><input type="checkbox" id="filter-skip-js" checked> Skip JavaScript</label>
          <label><input type="checkbox" id="filter-skip-fonts" checked> Skip Fonts</label>
          <label><input type="checkbox" id="filter-skip-media" checked> Skip Media</label>
          <label><input type="checkbox" id="filter-skip-websocket" checked> Skip WebSocket</label>     
      </div>
      <div id="files">
          <!-- File -->
          <button class="toolmenu" id="import-btn" title="Open from file">
            <img src="icons/open-folder.png" class="btn-icon" title="Open from file"/>
          </button>

          <button class="toolmenu" id="export-btn" title="Save to file">
            <img src="icons/save.png" class="btn-icon" title="Save to file"/>
          </button>

          <button id="clear" class="toolmenu" title="Clear All" >
            <img src="icons/clear.png" title="Clear All" class="btn-icon" style="padding-bottom:1px;"/>
          </button>

          <select id="filter-method" class="select" style="margin-left: 24px;">
            <option value="">All Methods</option>
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
            <option value="HEAD">HEAD</option>
            <option value="OPTIONS">OPTIONS</option>
          </select>

          <select id="filter-status" class="select">
            <option value="">All Status</option>
            <option value="2xx">2xx Success</option>
            <option value="3xx">3xx Redirect</option>
            <option value="4xx">4xx Client Error</option>
            <option value="5xx">5xx Server Error</option>
          </select>
        </div>
      <div id="log-list-container"></div>
    </div>
    <div id="divider"></div>
    <div id="detail-panel">
      <div id="detail-empty">Select a request to view details</div>
      <div id="detail-content"></div>
      <div class="sticky-search" id="sticky-search">
        <!-- search content -->
         <!-- Response Search -->
        <input
            id="response-search"
            type="text"
            placeholder="Search response..."
            spellcheck="false"/>

        <button id="response-search-prev" class="search-nav">◀</button>
        <button id="response-search-next" class="search-nav">▶</button>
      </div>
    </div>
  </div>

  <footer id="status-bar">
    <span id="status-text">Listening…</span>
    <span id="response-search-count"></span>
    <span id="status-count">0 requests</span>
    <div id="progress-container" hidden>
      <div id="progress-bar" style="width:0%;"></div>
    </div>
  </footer>

  <!-- Modal Konfirmasi Kustom -->
  <div id="confirmModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
    <div style="background: white; padding: 24px; border-radius: 12px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
      <p id="confirmMessage" style="margin-top: 0; font-size: 16px; color: #333;"></p>
      <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
        <button id="confirmNo" style="padding: 8px 20px; border: 1px solid #ccc; background: #f5f5f5; border-radius: 6px; cursor: pointer;">Cancel</button>
        <button id="confirmYes" style="padding: 8px 20px; border: none; background: #d32f2f; color: white; border-radius: 6px; cursor: pointer;">Delete All</button>
      </div>
    </div>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
